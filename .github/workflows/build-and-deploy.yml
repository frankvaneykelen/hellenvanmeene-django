name: Build and Deploy Django

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  AZURE_WEBAPP_NAME: hellenvanmeene-django

permissions:
  id-token: write   # required for OIDC login
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/prod.txt

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/prod.txt

      # -----------------------------------------------------------------------
      # 4. Run collectstatic
      #    DJANGO_SETTINGS_MODULE is set to prod; secrets are not needed for
      #    collectstatic when using whitenoise (STATICFILES_STORAGE serves
      #    from the local staticfiles/ dir at build time).
      # -----------------------------------------------------------------------
      - name: Collect static files
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          SECRET_KEY: placeholder-for-collectstatic
          DEBUG: "False"
          ALLOWED_HOSTS: "*"
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: ":memory:"
          DB_USER: placeholder
          DB_PASSWORD: placeholder
          DB_HOST: placeholder
        run: |
          python manage.py collectstatic --noinput

      # -----------------------------------------------------------------------
      # 5. Package for deployment
      # -----------------------------------------------------------------------
      - name: Create deployment zip
        run: |
          zip -r deploy.zip . \
            --exclude ".git/*" \
            --exclude ".venv/*" \
            --exclude ".github/*" \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude "*.env*" \
            --exclude "infra/*" \
            --exclude "tests/*"

      # -----------------------------------------------------------------------
      # 6. Azure OIDC login
      # -----------------------------------------------------------------------
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------------
      # 7. Deploy to Azure App Service (Linux)
      # -----------------------------------------------------------------------
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: hellenvanmeene-linux
          package: deploy.zip
