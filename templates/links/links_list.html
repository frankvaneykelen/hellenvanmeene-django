{% extends "base.html" %}
{% block title %}Links — Hellen van Meene{% endblock %}

{% block content %}

<div class="section-header">
    <div class="container">
        <div class="row">
            <div class="col-sm-12">
                <h1 class="animated slideInLeft"><span>Links for @hellenvanmeene</span></h1>
            </div>
        </div>
    </div>
</div>

<div class="container" style="padding-top: 40px; padding-bottom: 60px;">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9 col-sm-12">

            {% for link in links %}
            <div class="link-in-bio-item">
                <h4 class="link-in-bio-title">
                    <a href="{{ link.url }}" target="_blank" rel="noopener noreferrer">{{ link.label }}</a>
                </h4>
                {% if link.description %}
                <p class="link-in-bio-description">{{ link.description }}</p>
                {% endif %}
            </div>
            {% empty %}
            <p>No links available.</p>
            {% endfor %}

        </div>
    </div>
</div>

{% endblock %}
