{% extends "base.html" %}
{% block title %}News — Hellen van Meene{% endblock %}
{% block content %}
<h1>News</h1>
<ul>
{% for article in articles %}
  <li><a href="{% url 'news:detail' article.pk %}">{{ article.title }}</a></li>
{% empty %}
  <li>No news available.</li>
{% endfor %}
</ul>
{% endblock %}
